<!DOCTYPE html>

<title>قيد الصيانة — منارة المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:"Cairo",sans-serif;background:#080f1a;color:#fff;direction:rtl;display:flex;align-items:center;justify-content:center;padding:1.5rem;background-image:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,149,42,.12),transparent 60%)}
.card{max-width:440px;width:100%;text-align:center}
.logo{width:78px;height:78px;margin:0 auto 1.5rem;background:linear-gradient(135deg,#c9952a,#f0c04a);border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:"Amiri",serif;font-size:2.4rem;color:#080f1a;font-weight:700;box-shadow:0 10px 40px rgba(201,149,42,.35)}
h1{font-family:"Amiri",serif;font-size:2rem;line-height:1.3;margin-bottom:.5rem;background:linear-gradient(135deg,#fff 30%,#f0c04a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:.85rem;color:#8899aa;letter-spacing:1px;margin-bottom:2rem}
.icon{font-size:3rem;margin-bottom:1rem;display:block;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{background:rgba(255,255,255,.04);border:1px solid rgba(201,149,42,.18);border-radius:16px;padding:1.5rem 1.2rem;margin-bottom:1.5rem}
.msg p{color:#e8edf5;line-height:1.8;font-size:.95rem;margin-bottom:.75rem}
.msg p:last-child{margin-bottom:0;color:#8899aa;font-size:.82rem}
.wa{display:inline-flex;align-items:center;gap:.5rem;background:#25d366;color:#fff;padding:.8rem 1.6rem;border-radius:12px;text-decoration:none;font-weight:700;font-size:.9rem;transition:transform .2s}
.wa:hover{transform:translateY(-2px)}
.wa svg{width:18px;height:18px;fill:currentColor}
.footer{margin-top:2rem;font-size:.72rem;color:#4a5a6a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ن</div>
  <span class="icon">⚙️</span>
  <h1>قيد الصيانة</h1>
  <div class="sub">Under Maintenance</div>
  <div class="msg">
    <p>نعمل حالياً على تحسينات مهمة لتقديم تجربة تعليمية أفضل لك 🌙</p>
